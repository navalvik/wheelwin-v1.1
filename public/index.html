<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WheelWin</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

/* рекламный баннер */

#ad{
    height:10vh;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}

/* игровая зона */

#gameArea{
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* рулетка */

#wheelContainer{
    position:relative;
    width:300px;
    height:300px;
}

#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:8px solid gold;
    background:conic-gradient(
        red 0deg 72deg,
        blue 72deg 144deg,
        green 144deg 216deg,
        orange 216deg 288deg,
        purple 288deg 360deg
    );
    transition:transform 0.1s linear;
}

/* указатель выигрыша */

#pointer{
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:15px solid transparent;
    border-right:15px solid transparent;
    border-bottom:25px solid yellow;
}

/* кнопки */

#controls{
    height:20vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
}

button{
    width:200px;
    height:50px;
    font-size:18px;
    border:none;
    border-radius:10px;
}

#readyBtn{
    background:green;
    color:white;
}

#spinBtn{
    background:red;
    color:white;
}

#status{
    margin-top:10px;
    font-size:16px;
}

</style>

</head>


<body>

<!-- рекламный баннер -->

<div id="ad">
AD SPACE
</div>


<!-- игровая зона -->

<div id="gameArea">

<div id="wheelContainer">

<div id="pointer"></div>

<div id="wheel"></div>

</div>

</div>


<!-- кнопки -->

<div id="controls">

<button id="readyBtn">READY</button>

<button id="spinBtn">SPIN</button>

<div id="status">Waiting players...</div>

</div>


<script src="game.js"></script>

</body>

</html>
